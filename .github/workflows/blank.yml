name: Generate Pac-Man animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Pac-Man
        uses: gregrickaby/github-profile-readme-pacman@main
        with:
          github_username: LegabrieLp
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output: dist/pacman.svg

      - name: Push to pacman-output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
