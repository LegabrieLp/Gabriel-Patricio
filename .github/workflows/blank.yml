name: Generate Contribution Snake

on:
  schedule: # Roda automaticamente a cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch: # Permite rodar manualmente a qualquer momento

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout com versão atualizada e compatível com Node.js 20/24
      - uses: actions/checkout@v4

      # Gera a animação da cobrinha (Snake) com versão estável e atualizada
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk@v3
        with:
          github_user_name: LegabrieLp
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Salva os arquivos gerados na branch "output"
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
