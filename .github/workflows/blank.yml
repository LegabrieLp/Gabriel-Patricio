name: Generate Pac-Man animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Pac-Man animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LegabrieLp
          outputs: |
            dist/pacman.svg?color_snake=yellow&color_dots=#0d1117,#1a1b27,#2d2f4a,#4e5177,#6e72b5&color_food=#FFD700

      - name: Push to branch pacman-output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
